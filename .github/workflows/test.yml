
name: Test

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch:
    branches: [ master, develop ]

jobs:
  pytest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    # macos-latest is Apple Silicon. Every bundled mac64 binary (gringo,
    # clasp, BNetToPrime, ...) is Intel-only and needs Rosetta 2; piping
    # two Rosetta-translated processes together (gringo | clasp) is a
    # known source of the "bad input stream" parse errors seen here.
    # Kept in the matrix for visibility, not as a hard gate, until
    # ARM64 binaries or a system-tool fallback are added.
    continue-on-error: ${{ matrix.os == 'macos-latest' }}

    defaults:
      run:
        shell: bash

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2

      - name: set up Python 3.12
        uses: actions/setup-python@v2
        with:
          python-version: '3.12'

      - name: Display Python version
        run: python -c "import sys; print(sys.version)"

      - name: Install pyboolnet
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Install imagemagick and graphviz (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y graphviz imagemagick

      - name: Install imagemagick and graphviz (macOS)
        if: runner.os == 'macOS'
        run: brew install graphviz imagemagick

      - name: Install imagemagick and graphviz (Windows)
        if: runner.os == 'Windows'
        run: choco install graphviz imagemagick -y

      - name: Test with pytest
        run: pytest
